name: Run Selenium Tests

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 6
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.x'

    - name: Restore NuGet packages
      run: dotnet restore WebDriverDemo.sln

    - name: Build
      run: dotnet build WebDriverDemo.sln --no-restore

    - name: Run SauceLabs tests
      run: dotnet test WebDriverDemo.sln --no-build --filter "FullyQualifiedName~SauceLabs" --logger "trx;LogFileName=test-results.trx"

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: '**/test-results.trx'
